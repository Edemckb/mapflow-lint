name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v
      - run: mapflow-lint audit --strict examples/ruins-route.json
      - run: mapflow-lint generate build/generated.json --name "CI Route" --archetype fortress --branches 2 --seed 42
      - run: mapflow-lint audit --strict build/generated.json

